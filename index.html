<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Projeto Showroom</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">

    <div class="container">
        <h1 id="main-title">Texto alterado com JavaScript</h1>
        <p>Clique nos botões para ver alert, prompt, confirm, DOM, eventos e notificação.</p>

        <section class="card">
            <h2>Status</h2>
            <p id="status-text">Titulo alterado ✅</p>
            <p>Cliques: <span id="counter">0</span> &nbsp; Hora: <span id="clock">00:00:00</span></p>
        </section>

        <section class="card">
            <h2>Interações básicas</h2>
            <div class="button-group">
                <button onclick="alert('Isso é um Alert!')">Alert</button>
                <button onclick="confirm('Deseja confirmar?')">Confirm</button>
                <button onclick="prompt('Qual seu nome?')">Prompt</button>
                <button onclick="console.log('Log enviado ao console!')">Console.log</button>
            </div>
        </section>

        <section class="card">
            <h2>DOM + Eventos</h2>
            <label>Digite seu nome:</label>
            <input type="text" id="name-input" placeholder="">
            
            <div class="button-group">
                <button onclick="showName()">Mostrar na tela</button>
                <button onclick="changeTitle()">Mudar título</button>
                <button onclick="toggleTheme()">Trocar tema</button>
                <button onclick="sum()">Somar 2 números</button>
            </div>

            <p>Extra: passe o mouse no bloco abaixo 👇</p>
            <div id="hover-box" onmouseenter="handleEnter()" onmouseleave="handleLeave()">
                Aguardando mouse...
            </div>
        </section>
    </div>

    <div id="toast" class="hidden">Mouse entrou na caixa!</div>

    <script src="script.js"></script>
</body>
</html>
